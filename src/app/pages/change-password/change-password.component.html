<div class="page-container">
  <div class="page-title">
    <mat-icon>key</mat-icon>
    <span>เปลี่ยนรหัสผ่าน</span>
  </div>

  <div class="subtitle" *ngIf="schoolName">ชื่อสถานศึกษาวิชาทหาร : {{ schoolName }}</div>

  <mat-card class="section-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>lock</mat-icon>
      <mat-card-title>เปลี่ยนรหัสผ่าน</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="form-grid">
        <mat-form-field appearance="fill">
          <mat-label>รหัสผ่านเดิม</mat-label>
          <input matInput type="password" [(ngModel)]="oldPassword" maxlength="20" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>รหัสผ่านใหม่</mat-label>
          <input
            matInput
            type="password"
            [(ngModel)]="newPassword"
            maxlength="20"
            (keypress)="onKeyPressNumber($event)"
          />
          <mat-hint>รับเฉพาะตัวเลขอารบิก อย่างน้อย 4 ตัวอักษร</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>ยืนยันรหัสผ่านใหม่</mat-label>
          <input matInput type="password" [(ngModel)]="confirmPassword" maxlength="20" />
        </mat-form-field>
      </div>

      <div class="action-row">
        <button mat-flat-button color="primary" (click)="changePassword()" [disabled]="isLoading">
          <mat-icon *ngIf="!isLoading">save</mat-icon>
          <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
          {{ isLoading ? 'กำลังบันทึก...' : 'บันทึก' }}
        </button>
        <button mat-button (click)="resetForm()" [disabled]="isLoading">ยกเลิก</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
