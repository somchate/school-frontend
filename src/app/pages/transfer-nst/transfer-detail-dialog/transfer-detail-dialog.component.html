<h2 mat-dialog-title>รายละเอียดการโอนย้าย</h2>
<mat-dialog-content>
  <div class="detail-grid">
    <div class="detail-row">
      <span class="label">รหัส นศท.:</span>
      <span class="value">{{ data.nstId }}</span>
    </div>
    <div class="detail-row">
      <span class="label">ชื่อ-นามสกุล:</span>
      <span class="value">{{ data.name }}</span>
    </div>
    <div class="detail-row">
      <span class="label">ชั้นปี:</span>
      <span class="value">{{ data.atClass }}</span>
    </div>
    <div class="detail-row">
      <span class="label">โอนมาจาก:</span>
      <span class="value">{{ data.fromSchool }}</span>
    </div>
    <div class="detail-row">
      <span class="label">โอนไปยัง:</span>
      <span class="value">{{ data.toSchool }}</span>
    </div>
    <div class="detail-row">
      <span class="label">วันที่โอนย้าย:</span>
      <span class="value">{{ data.transferDate }}</span>
    </div>
    <div class="detail-row">
      <span class="label">คำสั่งที่:</span>
      <span class="value">{{ data.commandNo || '-' }}</span>
    </div>
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-raised-button mat-dialog-close color="primary">ปิด</button>
</mat-dialog-actions>
